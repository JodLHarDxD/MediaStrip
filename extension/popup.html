<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
:root {
  --bg: #080C10; --surface: #0E1318; --elevated: #141B22;
  --border: #1E2730; --cyan: #00E5FF; --violet: #7B61FF;
  --text: #F0F4F8; --muted: #7A8FA6; --err: #FF4D6A; --ok: #00D97E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 360px; background: var(--bg); color: var(--text);
  font-family: "DM Sans", system-ui, -apple-system, sans-serif; font-size: 13px;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.brand { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.brand span { color: var(--cyan); }
.status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--err); }
.dot.on { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
section { padding: 12px 16px; }
.server-row { display: flex; gap: 8px; }
.server-row input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 12px; outline: none;
}
.server-row input:focus { border-color: var(--cyan); }
.server-row button {
  background: var(--elevated); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 0 12px; cursor: pointer; font-size: 12px;
}
.server-row button:hover { border-color: var(--cyan); }
.page-btn {
  width: 100%; margin-top: 4px; padding: 11px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  color: #06090d; font-weight: 700; font-size: 13px; cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.page-btn:hover { transform: scale(1.015); box-shadow: 0 4px 18px rgba(0,229,255,0.3); }
.page-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
.list-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 16px; margin-top: 4px; color: var(--muted);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
}
#media-list { max-height: 260px; overflow-y: auto; padding: 6px 10px 12px; }
#media-list::-webkit-scrollbar { width: 5px; }
#media-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.item {
  display: flex; align-items: center; gap: 9px; padding: 8px;
  border-radius: 9px; margin: 2px 0;
}
.item:hover { background: var(--surface); }
.item .kind {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 7px;
  background: var(--elevated); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.item .info { flex: 1; min-width: 0; }
.item .name {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 12px; color: var(--text);
}
.item .meta { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
.item .dl {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 7px; border: 1px solid var(--border);
  background: transparent; color: var(--cyan); cursor: pointer; font-size: 13px;
}
.item .dl:hover { background: rgba(0,229,255,0.1); border-color: var(--cyan); }
.empty { text-align: center; color: var(--muted); padding: 22px 16px; font-size: 12px; }
#feedback {
  padding: 0 16px 12px; font-size: 12px; color: var(--muted); min-height: 16px;
}
#feedback a { color: var(--cyan); text-decoration: none; }
footer {
  border-top: 1px solid var(--border); padding: 10px 16px;
  display: flex; justify-content: space-between; font-size: 11px;
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--cyan); }
</style>
</head>
<body>
<header>
  <div class="brand">Media<span>Strip</span> Catcher</div>
  <div class="status"><div class="dot" id="server-dot"></div><span id="server-status">offline</span></div>
</header>

<section>
  <div class="server-row">
    <input type="text" id="server-url" placeholder="http://localhost:8000" spellcheck="false">
    <button id="server-save">Save</button>
  </div>
  <button class="page-btn" id="download-page">⬇ Download media on this page</button>
</section>

<div class="list-head">
  <span>Caught on this tab</span>
  <span id="count">0</span>
</div>
<div id="media-list"><div class="empty">No media sniffed yet — play a video or browse the page.</div></div>

<div id="feedback"></div>

<footer>
  <a href="#" id="open-app">Open MediaStrip ↗</a>
  <span style="color:var(--muted)">v1.0.0</span>
</footer>

<script src="popup.js"></script>
</body>
</html>
